side_polling.admin:
  path: '/admin/config/side-polling'
  defaults:
    _title: 'SIDE polling'
    _controller: '\Drupal\side_polling\Controller\SidePollingController::list'
  requirements:
    _permission: 'administer site configuration'
side_polling.finished:
  path: '/admin/config/side-polling/finished'
  defaults:
    _title: 'SIDE polling (finished)'
    _controller: '\Drupal\side_polling\Controller\SidePollingController::finished'
  requirements:
    _permission: 'administer site configuration'
side_polling.run_now:
  path: '/admin/config/side-polling/run/{job}'
  defaults:
    _title: 'Run polling job'
    _controller: '\Drupal\side_polling\Controller\SidePollingRunController::run'
  requirements:
    _permission: 'administer site configuration'
side_polling.cancel:
  path: '/admin/config/side-polling/cancel/{job}'
  defaults:
    _title: 'Cancel polling job'
    _controller: '\Drupal\side_polling\Controller\SidePollingRunController::cancel'
  requirements:
    _permission: 'administer site configuration'
side_polling.pause:
  path: '/admin/config/side-polling/pause/{job}'
  defaults:
    _title: 'Pause polling job'
    _controller: '\Drupal\side_polling\Controller\SidePollingRunController::pause'
  requirements:
    _permission: 'administer site configuration'
side_polling.unpause:
  path: '/admin/config/side-polling/unpause/{job}'
  defaults:
    _title: 'Unpause polling job'
    _controller: '\Drupal\side_polling\Controller\SidePollingRunController::unpause'
  requirements:
    _permission: 'administer site configuration'
