edit_settings.form:
  path: '/admin/settings/edit'
  defaults:
    _form: '\Drupal\edit_settings\Form\EditSettingsForm'
    _title: 'Edit settings files'
  requirements:
    _custom_access: '\Drupal\edit_settings\Form\EditSettingsForm::access'

edit_settings.manuals:
  path: '/admin/settings/manuals'
  defaults:
    _form: '\Drupal\edit_settings\Form\EditManualsForm'
    _title: 'Edit manuals files'
  requirements:
    _custom_access: '\Drupal\edit_settings\Form\EditManualsForm::access'
