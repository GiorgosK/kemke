services:
  logger.channel.incoming_api:
    parent: logger.channel_base
    arguments: ['incoming_api']

  incoming_api.chunk_upload_manager:
    class: Drupal\incoming_api\Service\ChunkUploadManager
    arguments:
      - '@keyvalue'
      - '@file_system'
      - '@uuid'
      - '@datetime.time'
      - '@logger.channel.incoming_api'

  incoming_api.api_exception_subscriber:
    class: Drupal\incoming_api\EventSubscriber\ApiExceptionSubscriber
    tags:
      - { name: event_subscriber }
