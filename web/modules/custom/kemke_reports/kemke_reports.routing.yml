kemke_reports.config_page:
  path: '/reports/config'
  defaults:
    _controller: '\Drupal\kemke_reports\Controller\ReportsConfigPageController::build'
  requirements:
    _permission: 'setup reports'

kemke_reports.reports_form:
  path: '/reports'
  defaults:
    _form: '\Drupal\kemke_reports\Form\ReportsGenerateForm'
    _title: 'Reports'
  requirements:
    _permission: 'view reports'

kemke_reports.results:
  path: '/reports/results'
  defaults:
    _controller: '\Drupal\kemke_reports\Controller\ReportsResultsController::build'
    _title: 'Report results'
  requirements:
    _permission: 'view reports'

kemke_reports.results_pdf:
  path: '/reports/results/pdf'
  defaults:
    _controller: '\Drupal\kemke_reports\Controller\ReportsResultsController::pdf'
    _title: 'Reports PDF'
  requirements:
    _permission: 'view reports'

kemke_reports.results_xls:
  path: '/reports/results/xls'
  defaults:
    _controller: '\Drupal\kemke_reports\Controller\ReportsResultsController::xls'
    _title: 'Reports XLS'
  requirements:
    _permission: 'view reports'
