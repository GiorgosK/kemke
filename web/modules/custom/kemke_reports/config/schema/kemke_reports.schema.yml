kemke_reports.settings:
  type: config_object
  label: 'Kemke reports settings'
  mapping:
    objective_1:
      type: mapping
      label: 'Objective 1'
      mapping:
        description:
          type: text
          label: 'Description'
        percentage:
          type: float
          label: 'Target percentage'
        deadline_days_default:
          type: integer
          label: 'Default deadline days'
        deadline_days_for_report:
          type: integer
          label: 'Deadline days for report'
