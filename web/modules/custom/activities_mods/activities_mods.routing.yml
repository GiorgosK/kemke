activities_mods.node_activity:
  path: '/node/{node}/activity'
  defaults:
    _controller: '\Drupal\activities_mods\Controller\ActivitiesModsController::activity'
    _title: 'Activity'
  requirements:
    _permission: 'access node activity'
    _activities_mods_incoming_node_only: 'TRUE'
  options:
    parameters:
      node:
        type: entity:node

activities_mods.user_activity:
  path: '/user/{user}/activity'
  defaults:
    _controller: '\Drupal\activities_mods\Controller\ActivitiesModsController::userActivity'
    _title: 'Activity'
  requirements:
    _permission: 'can view users activity'
  options:
    parameters:
      user:
        type: entity:user
