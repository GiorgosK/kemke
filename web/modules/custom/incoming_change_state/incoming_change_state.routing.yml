incoming_change_state.change_state:
  path: '/node/{node}/change_state'
  defaults:
    _title: 'Change state'
    _form: '\Drupal\incoming_change_state\Form\IncomingChangeStateForm'
  requirements:
    _permission: 'change to arbitary state'
    _entity_access: 'node.view'
    _incoming_change_state_incoming_node_only: 'TRUE'
  options:
    parameters:
      node:
        type: entity:node
