langcode: el
objective_1:
  name: '1 - Γνωμοδοτήσεις'
  description: 'Πλήθος γνωμοδοτήσεων εντός είκοσι (20) εργάσιμων ημερών (από την πληρότητα του φακέλου) επί σχεδίων νόμων, υπουργικών αποφάσεων και προσκλήσεων δημοσιονομικού χαρακτήρα/πλήθος των εισερχόμενων αιτημάτων για διατύπωση γνωμοδότησης επί σχεδίων νόμων, υπουργικών αποφάσεων και προσκλήσεων δημοσιονομικού χαρακτήρα. '
  title: 'Αριθμός μέτρων κρατικών ενισχύσεων για τις οποίες διαβιβάστηκαν συνοπτικές πληροφορίες εντός [deadline_days_default] εργάσιμων ημερών από την πληρότητα αιτήματος το [year]/ Αριθμός σχετικών αιτημάτων που υποβλήθηκαν το [year]. Επιδιώκεται η έγκαιρη και έγκρυση ανταπόκριση'
  percentage: 90.0
  deadline_days_default: 20
  deadline_days_for_report: 0
objective_2:
  name: '2 - Αιτήματα από ιεραρχία'
  description: 'Πλήθος απόψεων εντός δέκα (10) εργάσιμων ημερών επί επειγόντων, προς άμεση θέσπιση, σχεδίων νόμων και υπουργικών αποφάσεων δημοσιονομικού χαρακτήρα που προωθούνται από την ιεραρχία/πλήθος των εν λόγω εισερχόμενων αιτημάτων για διατύπωση απόψεων επί επειγόντων προς θέσπιση σχεδίων νόμων και υπουργικών αποφάσεων δημοσιονομικού χαρακτήρα.'
  title: ''
  percentage: 80.0
  deadline_days_default: 10
  deadline_days_for_report: 0
objective_3:
  name: '3 - Κοινοποιήσεις Γνωστοποιήσεiς'
  description: "Πλήθος υπογεγραμμένων ή απορριφθεισών κοινοποιήσεων ή γνωστοποιήσεων σχεδίων κρατικών ενισχύσεων στο ΠΣ SANI2 της ΕΕ, σύμφωνα με το ενωσιακό δίκαιο, εντός είκοσι (20) εργάσιμων ημερών/πλήθος των οριστικοποιημένων κρατικών ενισχύσεων προς κοινοποίηση/γνωστοποίηση στην ΕΕ. \r\n"
  title: ''
  percentage: 90.0
  deadline_days_default: 20
  deadline_days_for_report: 0
objective_4:
  name: '4 - Έκθεση Δαπανών SARI'
  description: "Πλήθος υποθέσεων για τις οποίες υποβλήθηκαν εμπρόθεσμα στοιχεία δαπανών για μέτρα κρατικών ενισχύσεων στην ΕΕ/πλήθος υποθέσεων επί των οποίων ζητήθηκαν στοιχεία δαπανών.\r\n"
  title: ''
  percentage: 90.0
objective_5:
  name: '5 - Ανάκτηση'
  description: 'Πλήθος διεκπεραιωμένων αιτημάτων παροχής πληροφοριών προς την DG Comp επί υποθέσεων ανακτήσεων/πλήθος αιτημάτων παροχής πληροφοριών από την DG Comp επί υποθέσεων ανάκτησης για τις οποίες παρασχέθηκαν στοιχεία από τις αρμόδιες επισπεύδουσες αρχές.'
  title: ''
  percentage: 90.0
objective_6:
  name: '6 - Σεμινάρια'
  description: "Ποσοστό υπαλλήλων που παρακολούθησαν τουλάχιστον 1 επιμορφωτικό σεμινάριο για το έτος\r\n"
  title: ''
  percentage: 30.0
